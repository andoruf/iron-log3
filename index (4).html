<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG v2.1</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#17202a;
  --muted:#6b7280;
  --line:#e5e7eb;
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --orange:#f97316;
  --red:#ef4444;
  --green:#16a34a;
  --purple:#9333ea;
  --shadow:0 10px 28px rgba(15,23,42,.10);
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  padding:24px 16px;
  text-align:center;
  box-shadow:0 4px 16px rgba(37,99,235,.25);
}

header h1{
  margin:0;
  font-size:30px;
  letter-spacing:.04em;
}

header p{margin:6px 0 0;opacity:.9}

main{
  max-width:760px;
  margin:0 auto;
  padding:16px 16px 100px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

h2{margin:0 0 14px;font-size:20px}

label{
  display:block;
  font-weight:700;
  margin:12px 0 6px;
}

input,select,button,textarea{
  width:100%;
  font-size:16px;
  border-radius:14px;
  border:1px solid var(--line);
  padding:12px;
  background:#fff;
}

button{
  border:none;
  font-weight:800;
  cursor:pointer;
}

.btn-main{background:var(--blue);color:white}
.btn-sub{background:#eef2ff;color:#1d4ed8}
.btn-orange{background:var(--orange);color:white}
.btn-red{background:var(--red);color:white}
.btn-green{background:var(--green);color:white}
.btn-gray{background:#e5e7eb;color:#374151}
.btn-purple{background:var(--purple);color:white}

.nav{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.page{display:none}
.page.active{display:block}

.set-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.input-unit{position:relative}

.input-unit span{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-weight:700;
}

.input-unit input{padding-right:42px}

.history-item{
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  background:#fff;
}

.history-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
  font-weight:800;
}

.history-date{color:var(--blue)}

.history-sets{
  color:#374151;
  line-height:1.7;
  margin:8px 0;
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.delete-box{
  background:#fff7ed;
  border:1px solid #fed7aa;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}

.delete-box p{
  margin:0 0 10px;
  font-weight:800;
  color:#9a3412;
}

.small{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:20px;
}

/* calendar */
.calendar-head{
  display:grid;
  grid-template-columns:44px 1fr 44px;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
}

.calendar-title{
  text-align:center;
  font-size:20px;
  font-weight:900;
}

.week-row,.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.week-row div{
  text-align:center;
  font-weight:800;
  color:#6b7280;
  padding:8px 0;
  font-size:14px;
}

.calendar-day{
  min-height:70px;
  border:1px solid var(--line);
  background:#fff;
  padding:6px;
  position:relative;
}

.calendar-day.other{
  background:#f9fafb;
  color:#c4c4c4;
}

.calendar-day.today{
  background:#eff6ff;
  border:2px solid var(--blue);
}

.calendar-day.selected{
  background:#dbeafe;
}

.day-num{
  font-weight:800;
  font-size:14px;
}

.dot-area{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-top:8px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--orange);
}

.calendar-summary{
  margin-top:14px;
}

.summary-title{
  font-weight:900;
  font-size:18px;
  margin-bottom:10px;
}

.summary-item{
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  background:#fff;
}

.summary-item strong{
  color:var(--blue);
}

footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:white;
  border-top:1px solid var(--line);
  padding:10px;
}

.footer-inner{
  max-width:760px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
</style>
</head>

<body>

<header>
  <h1>IRON LOG v2.1</h1>
  <p>カレンダー追加版</p>
</header>

<main>

  <div class="nav">
    <button class="btn-main" data-page="inputPage">入力</button>
    <button class="btn-orange" data-page="historyPage">履歴</button>
    <button class="btn-purple" data-page="calendarPage">カレンダー</button>
  </div>

  <section id="inputPage" class="page active">
    <div class="card">
      <h2>トレーニング入力</h2>

      <label>日付</label>
      <input type="date" id="dateInput">

      <label>種目</label>
      <select id="exerciseSelect"></select>

      <label>種目追加</label>
      <input type="text" id="newExerciseInput" placeholder="例：ベンチプレス">
      <button class="btn-sub" id="addExerciseBtn" style="margin-top:8px;">種目を追加</button>

      <label>5セット入力</label>
      <div id="setsArea"></div>

      <label>メモ</label>
      <textarea id="memoInput" rows="3" placeholder="体調、フォーム、気づきなど"></textarea>

      <button class="btn-main" id="saveBtn" style="margin-top:14px;">記録を保存</button>
      <button class="btn-gray" id="resetBtn" style="margin-top:8px;">入力をリセット</button>

      <p class="small">※ kg・回の単位は入力中も消えません。</p>
    </div>

    <div class="card">
      <h2>データ管理</h2>
      <button class="btn-green" id="exportBtn">データを書き出し</button>
      <input type="file" id="importInput" accept="application/json" style="margin-top:10px;">
      <p class="small">バックアップ用です。JSONファイルとして保存・読み込みできます。</p>
    </div>
  </section>

  <section id="historyPage" class="page">
    <div class="card">
      <h2>履歴</h2>
      <div id="historyArea"></div>
    </div>
  </section>

  <section id="calendarPage" class="page">
    <div class="card">
      <h2>カレンダー</h2>

      <div class="calendar-head">
        <button class="btn-gray" id="prevMonthBtn">‹</button>
        <div class="calendar-title" id="calendarTitle"></div>
        <button class="btn-gray" id="nextMonthBtn">›</button>
      </div>

      <div class="week-row">
        <div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div><div>日</div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>

      <div class="calendar-summary" id="calendarSummary"></div>
    </div>
  </section>

</main>

<footer>
  <div class="footer-inner">
    <button class="btn-main" data-page="inputPage">入力</button>
    <button class="btn-orange" data-page="historyPage">履歴</button>
    <button class="btn-purple" data-page="calendarPage">カレンダー</button>
  </div>
</footer>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "iron_log_v2_records";
  const EXERCISE_KEY = "iron_log_v2_exercises";

  const defaultExercises = [
    "ベンチプレス",
    "スクワット",
    "デッドリフト",
    "ショルダープレス",
    "ラットプルダウン",
    "ダンベルカール",
    "レッグプレス"
  ];

  const colors = ["#2563eb","#f97316","#16a34a","#9333ea","#ef4444","#0891b2"];

  let records = loadData(STORAGE_KEY, []);
  let exercises = loadData(EXERCISE_KEY, defaultExercises);
  let editingId = null;
  let pendingDeleteId = null;

  const now = new Date();
  let calendarYear = now.getFullYear();
  let calendarMonth = now.getMonth();
  let selectedDate = formatDate(now);

  const dateInput = document.getElementById("dateInput");
  const exerciseSelect = document.getElementById("exerciseSelect");
  const newExerciseInput = document.getElementById("newExerciseInput");
  const setsArea = document.getElementById("setsArea");
  const memoInput = document.getElementById("memoInput");
  const historyArea = document.getElementById("historyArea");
  const calendarTitle = document.getElementById("calendarTitle");
  const calendarGrid = document.getElementById("calendarGrid");
  const calendarSummary = document.getElementById("calendarSummary");

  function loadData(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){
      return fallback;
    }
  }

  function saveData(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    localStorage.setItem(EXERCISE_KEY, JSON.stringify(exercises));
  }

  function formatDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return y + "-" + m + "-" + day;
  }

  function today(){
    return formatDate(new Date());
  }

  function makeId(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function escapeHTML(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function renderExercises(){
    exerciseSelect.innerHTML = "";
    exercises.forEach(name=>{
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      exerciseSelect.appendChild(option);
    });
  }

  function renderSetInputs(){
    setsArea.innerHTML = "";
    for(let i=1;i<=5;i++){
      const row = document.createElement("div");
      row.className = "set-row";
      row.innerHTML = `
        <div class="input-unit">
          <input type="number" min="0" step="0.5" id="kg${i}" placeholder="${i}セット目 重さ">
          <span>kg</span>
        </div>
        <div class="input-unit">
          <input type="number" min="0" step="1" id="rep${i}" placeholder="${i}セット目 回数">
          <span>回</span>
        </div>
      `;
      setsArea.appendChild(row);
    }
  }

  function resetForm(){
    editingId = null;
    dateInput.value = today();
    memoInput.value = "";
    for(let i=1;i<=5;i++){
      document.getElementById("kg"+i).value = "";
      document.getElementById("rep"+i).value = "";
    }
    document.getElementById("saveBtn").textContent = "記録を保存";
  }

  function collectSets(){
    const sets = [];
    for(let i=1;i<=5;i++){
      const kg = document.getElementById("kg"+i).value;
      const reps = document.getElementById("rep"+i).value;
      if(kg !== "" || reps !== ""){
        sets.push({kg:kg,reps:reps});
      }
    }
    return sets;
  }

  function saveRecord(){
    const date = dateInput.value || today();
    const exercise = exerciseSelect.value;
    const sets = collectSets();
    const memo = memoInput.value.trim();

    if(!exercise){
      alert("種目を選択してください。");
      return;
    }

    if(sets.length === 0){
      alert("最低1セットは入力してください。");
      return;
    }

    const record = {
      id: editingId || makeId(),
      date,
      exercise,
      sets,
      memo,
      updatedAt: new Date().toISOString()
    };

    if(editingId){
      records = records.map(r => r.id === editingId ? record : r);
    }else{
      records.push(record);
    }

    saveData();
    resetForm();
    renderHistory();
    renderCalendar();
    showPage("historyPage");
  }

  function renderHistory(){
    pendingDeleteId = null;

    if(records.length === 0){
      historyArea.innerHTML = `<div class="empty">まだ記録がありません。</div>`;
      return;
    }

    const sorted = [...records].sort((a,b)=>{
      if(a.date === b.date) return b.updatedAt.localeCompare(a.updatedAt);
      return b.date.localeCompare(a.date);
    });

    historyArea.innerHTML = "";

    sorted.forEach(record=>{
      const item = document.createElement("div");
      item.className = "history-item";
      item.dataset.id = record.id;

      const setsText = record.sets.map((s,i)=>{
        const kg = s.kg !== "" ? s.kg : "-";
        const reps = s.reps !== "" ? s.reps : "-";
        return `${i+1}セット目：${kg}kg × ${reps}回`;
      }).join("<br>");

      item.innerHTML = `
        <div class="history-head">
          <span>${escapeHTML(record.exercise)}</span>
          <span class="history-date">${escapeHTML(record.date)}</span>
        </div>
        <div class="history-sets">${setsText}</div>
        ${record.memo ? `<div class="small">メモ：${escapeHTML(record.memo)}</div>` : ""}
        <div class="action-row">
          <button class="btn-sub edit-btn">編集</button>
          <button class="btn-red delete-open-btn">削除</button>
        </div>
        <div class="delete-box" style="display:none;">
          <p>この記録を削除しますか？</p>
          <div class="action-row">
            <button class="btn-red delete-confirm-btn">削除する</button>
            <button class="btn-gray delete-cancel-btn">キャンセル</button>
          </div>
        </div>
      `;

      historyArea.appendChild(item);
    });
  }

  function editRecord(id){
    const record = records.find(r=>r.id===id);
    if(!record) return;

    editingId = id;
    dateInput.value = record.date;
    exerciseSelect.value = record.exercise;
    memoInput.value = record.memo || "";

    for(let i=1;i<=5;i++){
      document.getElementById("kg"+i).value = "";
      document.getElementById("rep"+i).value = "";
    }

    record.sets.forEach((set,index)=>{
      const n = index + 1;
      if(n <= 5){
        document.getElementById("kg"+n).value = set.kg;
        document.getElementById("rep"+n).value = set.reps;
      }
    });

    document.getElementById("saveBtn").textContent = "編集を保存";
    showPage("inputPage");
  }

  function openDeleteBox(id){
    pendingDeleteId = id;

    document.querySelectorAll(".delete-box").forEach(box=>{
      box.style.display = "none";
    });

    const item = document.querySelector(`.history-item[data-id="${id}"]`);
    if(item){
      item.querySelector(".delete-box").style.display = "block";
    }
  }

  function cancelDelete(){
    pendingDeleteId = null;
    document.querySelectorAll(".delete-box").forEach(box=>{
      box.style.display = "none";
    });
  }

  function confirmDelete(id){
    if(!id || id !== pendingDeleteId) return;

    records = records.filter(r=>r.id !== id);
    saveData();
    pendingDeleteId = null;
    renderHistory();
    renderCalendar();
  }

  function addExercise(){
    const name = newExerciseInput.value.trim();
    if(!name) return;

    if(!exercises.includes(name)){
      exercises.push(name);
      saveData();
      renderExercises();
    }

    exerciseSelect.value = name;
    newExerciseInput.value = "";
  }

  function showPage(pageId){
    document.querySelectorAll(".page").forEach(page=>{
      page.classList.remove("active");
    });
    document.getElementById(pageId).classList.add("active");

    if(pageId === "historyPage") renderHistory();
    if(pageId === "calendarPage") renderCalendar();
  }

  function getRecordsByDate(date){
    return records.filter(r=>r.date === date);
  }

  function getExerciseColor(exercise){
    let index = exercises.indexOf(exercise);
    if(index < 0) index = 0;
    return colors[index % colors.length];
  }

  function renderCalendar(){
    calendarTitle.textContent = `${calendarYear}年${calendarMonth + 1}月`;
    calendarGrid.innerHTML = "";

    const first = new Date(calendarYear, calendarMonth, 1);

    let startDay = first.getDay();
    startDay = startDay === 0 ? 6 : startDay - 1;

    const startDate = new Date(calendarYear, calendarMonth, 1 - startDay);

    for(let i=0;i<42;i++){
      const d = new Date(startDate);
      d.setDate(startDate.getDate() + i);

      const dateStr = formatDate(d);
      const dayRecords = getRecordsByDate(dateStr);

      const cell = document.createElement("div");
      cell.className = "calendar-day";
      cell.dataset.date = dateStr;

      if(d.getMonth() !== calendarMonth) cell.classList.add("other");
      if(dateStr === today()) cell.classList.add("today");
      if(dateStr === selectedDate) cell.classList.add("selected");

      const dots = dayRecords.slice(0,6).map(r=>{
        return `<span class="dot" style="background:${getExerciseColor(r.exercise)}"></span>`;
      }).join("");

      cell.innerHTML = `
        <div class="day-num">${d.getDate()}</div>
        <div class="dot-area">${dots}</div>
      `;

      calendarGrid.appendChild(cell);
    }

    renderCalendarSummary(selectedDate);
  }

  function calcVolume(record){
    return record.sets.reduce((sum,set)=>{
      const kg = Number(set.kg) || 0;
      const reps = Number(set.reps) || 0;
      return sum + kg * reps;
    },0);
  }

  function renderCalendarSummary(date){
    const dayRecords = getRecordsByDate(date);
    const labelDate = date.replaceAll("-","/");

    if(dayRecords.length === 0){
      calendarSummary.innerHTML = `
        <div class="summary-title">${labelDate}</div>
        <div class="empty">この日の記録はありません。</div>
      `;
      return;
    }

    const totalVolume = dayRecords.reduce((sum,r)=>sum + calcVolume(r),0);

    const html = dayRecords.map(r=>{
      const sets = r.sets.map((s,i)=>{
        const kg = s.kg !== "" ? s.kg : "-";
        const reps = s.reps !== "" ? s.reps : "-";
        return `${i+1}セット目：${kg}kg × ${reps}回`;
      }).join("<br>");

      return `
        <div class="summary-item">
          <strong>${escapeHTML(r.exercise)}</strong>
          <div class="small">ボリューム：${calcVolume(r).toLocaleString()} kg</div>
          <div class="history-sets">${sets}</div>
          ${r.memo ? `<div class="small">メモ：${escapeHTML(r.memo)}</div>` : ""}
        </div>
      `;
    }).join("");

    calendarSummary.innerHTML = `
      <div class="summary-title">${labelDate}</div>
      <div class="small" style="margin-bottom:10px;">総ボリューム：${totalVolume.toLocaleString()} kg</div>
      ${html}
    `;
  }

  function exportData(){
    const data = {
      app:"IRON LOG v2.1",
      exportedAt:new Date().toISOString(),
      exercises,
      records
    };

    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "iron-log-v2-backup.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(file){
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);

        if(Array.isArray(data.records)) records = data.records;
        if(Array.isArray(data.exercises)) exercises = data.exercises;

        saveData();
        renderExercises();
        renderHistory();
        renderCalendar();
        resetForm();
        alert("データを読み込みました。");
      }catch(e){
        alert("読み込みに失敗しました。JSONファイルを確認してください。");
      }
    };

    reader.readAsText(file);
  }

  document.getElementById("saveBtn").addEventListener("click", saveRecord);
  document.getElementById("resetBtn").addEventListener("click", resetForm);
  document.getElementById("addExerciseBtn").addEventListener("click", addExercise);
  document.getElementById("exportBtn").addEventListener("click", exportData);

  document.getElementById("importInput").addEventListener("change", function(e){
    importData(e.target.files[0]);
    e.target.value = "";
  });

  document.getElementById("prevMonthBtn").addEventListener("click", function(){
    calendarMonth--;
    if(calendarMonth < 0){
      calendarMonth = 11;
      calendarYear--;
    }
    renderCalendar();
  });

  document.getElementById("nextMonthBtn").addEventListener("click", function(){
    calendarMonth++;
    if(calendarMonth > 11){
      calendarMonth = 0;
      calendarYear++;
    }
    renderCalendar();
  });

  document.addEventListener("click", function(e){
    const pageBtn = e.target.closest("[data-page]");
    if(pageBtn){
      showPage(pageBtn.dataset.page);
      return;
    }

    const calDay = e.target.closest(".calendar-day");
    if(calDay){
      selectedDate = calDay.dataset.date;
      renderCalendar();
      return;
    }

    const item = e.target.closest(".history-item");
    if(!item) return;

    const id = item.dataset.id;

    if(e.target.classList.contains("edit-btn")) editRecord(id);
    if(e.target.classList.contains("delete-open-btn")) openDeleteBox(id);
    if(e.target.classList.contains("delete-cancel-btn")) cancelDelete();
    if(e.target.classList.contains("delete-confirm-btn")) confirmDelete(id);
  });

  dateInput.value = today();
  renderExercises();
  renderSetInputs();
  renderHistory();
  renderCalendar();

})();
</script>

</body>
</html>
